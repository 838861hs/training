<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>first_issue</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <script
  src="https://code.jquery.com/jquery-1.12.4.min.js"
  integrity="sha256-ZosEbRLbNQzLpnKIkEdrPv7lOy9C27hHQ+Xp8a4MxAQ="
  crossorigin="anonymous"></script>
  <script src="js/script.js"></script>
</head>
<body>
<header>
  <h1><img src="img/logo.png" alt="logo"></h1>
  <ul class="h_nav">
    <li><a href="#">映画一覧</a></li>
    <li><a href="#">お問い合わせ</a></li>
  </ul>
</header>
<main>
  <section class="main_visual">
  <div class="bg_box">
    <div class="mv_bg first"></div>
    <div class="mv_bg second"></div>
    <div class="mv_bg third"></div>
  </div><!-- bg_box -->

    <div class="slide_nav">
      <div class="prev"><img src="img/carousel_left.png" alt="left"></div>
      <div class="next"><img src="img/carousel_right.png" alt="right"></div>
    </div><!-- slide_nav -->
    <div class="about_box">
      <h2>About</h2>
      <p class="text">Filmsは年間約300本の映画を視聴する運営者
      が<br>おすすめの映画を皆様にご紹介させていただくための<br>Webサイトです。</p>
    </div><!-- about_box -->
  </section><!-- main_visual -->

  <section class="contents">
    <div class="contents_inner">
      <div class="tab_box">
        <ul class="tab_name">
          <li id="all" class="active"><a href="javascript:void(0)">All</a></li>
          <li id="action"><a href="javascript:void(0)">ACTION</a></li>
          <li id="sf"><a href="javascript:void(0)">SF</a></li>
          <li id="romance"><a href="javascript:void(0)">ROMANCE</a></li>
          <li id="comedy"><a href="javascript:void(0)">COMEDY</a></li>
        </ul><!-- tab_tag -->

        <div class="photo_content all active">
           <div class="photo_box"><img src="img/film1.jpg" alt=""></div>
           <div class="photo_box"><img src="img/film2.jpg" alt=""></div>
           <div class="photo_box"><img src="img/film3.jpg" alt=""></div>
           <div class="photo_box"><img src="img/film4.jpg" alt=""></div>
           <div class="photo_box"><img src="img/film5.jpg" alt=""></div>
           <div class="photo_box"><img src="img/film6.jpg" alt=""></div>   
        </div>
        <div class="photo_content action">
           <div class="photo_box"><img src="img/action.jpg" alt=""></div>
           <div class="photo_box"><img src="img/action.jpg" alt=""></div>
           <div class="photo_box"><img src="img/action.jpg" alt=""></div>
           <div class="photo_box"><img src="img/action.jpg" alt=""></div>
           <div class="photo_box"><img src="img/action.jpg" alt=""></div>
           <div class="photo_box"><img src="img/action.jpg" alt=""></div>   
        </div>
        <div class="photo_content sf">
           <div class="photo_box"><img src="img/sf.jpg" alt=""></div>
           <div class="photo_box"><img src="img/sf.jpg" alt=""></div>
           <div class="photo_box"><img src="img/sf.jpg" alt=""></div>
           <div class="photo_box"><img src="img/sf.jpg" alt=""></div>
           <div class="photo_box"><img src="img/sf.jpg" alt=""></div>
           <div class="photo_box"><img src="img/sf.jpg" alt=""></div>   
        </div>
        <div class="photo_content romance">
           <div class="photo_box"><img src="img/romance.jpg" alt=""></div>
           <div class="photo_box"><img src="img/romance.jpg" alt=""></div>
           <div class="photo_box"><img src="img/romance.jpg" alt=""></div>
           <div class="photo_box"><img src="img/romance.jpg" alt=""></div>
           <div class="photo_box"><img src="img/romance.jpg" alt=""></div>
           <div class="photo_box"><img src="img/romance.jpg" alt=""></div>   
        </div>
        <div class="photo_content comedy">
           <div class="photo_box"><img src="img/comedy.jpg" alt=""></div>
           <div class="photo_box"><img src="img/comedy.jpg" alt=""></div>
           <div class="photo_box"><img src="img/comedy.jpg" alt=""></div>
           <div class="photo_box"><img src="img/comedy.jpg" alt=""></div>
           <div class="photo_box"><img src="img/comedy.jpg" alt=""></div>
           <div class="photo_box"><img src="img/comedy.jpg" alt=""></div>   
        </div>

        <p class="more"><a href="#">more</a></p>
      </div><!-- tab_box -->
      <div class="contact_box">
        <h2>Contact</h2>
        <p>本サイトに関するお問い合わせやご要望はこちらから</p>
        <ul class="buttons">
          <li><a href="#">Mail</a></li>
          <li><a href="#">Form</a></li>
        </ul>
      </div><!-- contact_box -->
    </div><!-- contents -->
  </section><!-- contents -->
  <section class="add_carousel">
    <div class="bg_box">
      <div class="mv_bg first"></div>
      <div class="mv_bg second"></div>
      <div class="mv_bg third"></div>
    </div><!-- bg_box -->
    <div class="slide_nav">
      <div class="prev"><img src="img/carousel_left.png" alt="left"></div>
      <div class="next"><img src="img/carousel_right.png" alt="right"></div>
    </div><!-- slide_nav -->
  </section><!-- carousel -->
</main>

<footer>
  <h2><img src="img/logo.png" alt="logo"></h2>
  <p class="copy">Copyright&#xA9;2017 Films All Right Reserved</p>
</footer>
</body>
</html>
